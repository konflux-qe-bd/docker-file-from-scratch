        - name: bundle
          value: quay.io/konflux-ci/pull-request-builds:sast-shell-check-0.1@sha256:46cbc7a74f4a9a3087c05d2bd57bc1e21c4d6bb9a4e6b588d1cc9f75ed791061
        - name: kind
          value: task
        resolver: bundles
      when:
      - input: $(params.skip-checks)
        operator: in
