      runAfter:
      - build-image-index
      taskRef:
        params:
        - name: name
          value: sast-unicode-check
        - name: bundle
          value: quay.io/konflux-ci/pull-request-builds:sast-unicode-check-0.3@sha256:b9638471501e5cf451c1a5c1cd01ded5f655ab5d78672c9d9cb1d594f269c74e
